<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lasala — Offline</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #0f172a;
        background: #f4f4f5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 360px;
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 600;
      }
      p {
        margin: 0 0 16px;
        color: #475569;
        line-height: 1.45;
      }
      a {
        display: inline-block;
        padding: 8px 16px;
        background: #0f172a;
        color: #f8fafc;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ești offline</h1>
      <p>Nu te putem conecta la Lasala chiar acum. Verifică internetul și încearcă din nou.</p>
      <a href="/">Reîncearcă</a>
    </main>
  </body>
</html>
